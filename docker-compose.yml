services:


  frontend:

    build:
      context: ./frontend

    container_name: jellyreport_frontend

    restart: unless-stopped



  backend:

    build:
      context: ./backend

    container_name: jellyreport_backend

    volumes:
      - ./config:/app/config

    restart: unless-stopped



  nginx:

    build:
      context: ./nginx

    container_name: jellyreport_nginx

    ports:
      - "10910:80"

    depends_on:
      - frontend
      - backend

    restart: unless-stopped
